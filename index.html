<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saheli Label Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --brand: #db2777; --bg: #fff1f2; --card: #ffffff; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        
        .app-card { width: 100%; max-width: 400px; background: var(--card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--brand); margin: 0; font-size: 1.8rem; letter-spacing: 1px; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--brand); }

        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .btn-generate { background: var(--brand); color: white; }
        .btn-reset { background: #10b981; color: white; display: none; }
        
        #result-area { display: none; text-align: center; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #eee; }
        #qrcode-canvas { display: inline-block; padding: 10px; background: white; border: 1px solid #eee; margin-bottom: 10px; }
        
        .history { width: 100%; max-width: 400px; margin-top: 20px; }
        .h-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 5px; font-size: 0.8rem; display: flex; justify-content: space-between; border-left: 4px solid var(--brand); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>SAHELI</h1>
        <p style="margin:0; font-size:0.8rem; color:#9d174d;">Boutique Label Pro</p>
    </div>

    <div id="form-box">
        <div class="input-group"><label>Product Name</label><input type="text" id="p_name" placeholder="Item Name"></div>
        <div class="input-group"><label>Model Code</label><input type="text" id="p_model" placeholder="Model #"></div>
        <div class="input-group"><label>Color</label><input type="text" id="p_color" placeholder="Color"></div>
        <div class="input-group"><label>Price (₹)</label><input type="number" id="p_price" placeholder="Amount"></div>
        <button class="btn-generate" onclick="processLabel()">Generate Label</button>
    </div>

    <div id="result-area">
        <div id="qrcode-canvas"></div>
        <p style="font-weight: bold; color: #10b981;">Label Created Successfully!</p>
        <button class="btn-reset" id="reset-btn" onclick="resetApp()">Create New Label</button>
    </div>
</div>

<div class="history" id="history-box"></div>

<script>
    function processLabel() {
        const name = document.getElementById('p_name').value;
        const model = document.getElementById('p_model').value;
        const color = document.getElementById('p_color').value;
        const price = document.getElementById('p_price').value;

        if (!name || !model || !color || !price) {
            alert("Please fill all fields!");
            return;
        }

        // Generate QR
        const qrDiv = document.getElementById("qrcode-canvas");
        qrDiv.innerHTML = "";
        const qrData = `SAHELI\nItem: ${name}\nCode: ${model}\nColor: ${color}\nPrice: Rs.${price}`;
        
        new QRCode(qrDiv, {
            text: qrData,
            width: 160,
            height: 160
        });

        // Small delay to let QR render before PDF
        setTimeout(() => {
            const { jsPDF } = window.jspdf;
            const canvas = qrDiv.querySelector('canvas');
            const doc = new jsPDF({ unit: "mm", format: [80, 100] });

            // Layout
            doc.setFont("helvetica", "bold");
            doc.setTextColor(219, 39, 119);
            doc.text("SAHELI", 40, 15, { align: "center" });
            
            doc.addImage(canvas.toDataURL("image/png"), 'PNG', 15, 20, 50, 50);
            
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(11);
            doc.text(name, 40, 78, { align: "center", maxWidth: 70 });
            
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.text(`Code: ${model} | Color: ${color}`, 40, 85, { align: "center" });
            
            doc.setFont("helvetica", "bold");
            doc.setFontSize(11);
            doc.text(`Price: Rs. ${price}`, 40, 93, { align: "center" });

            doc.save(`Saheli_${model}.pdf`);

            // Toggle UI
            document.getElementById('form-box').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('reset-btn').style.display = 'block';
            
            saveToHistory(name, color, price);
        }, 500);
    }

    function saveToHistory(n, c, p) {
        let history = JSON.parse(localStorage.getItem('saheli_history') || '[]');
        history.push({ n, c, p });
        if (history.length > 5) history.shift();
        localStorage.setItem('saheli_history', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const box = document.getElementById('history-box');
        let history = JSON.parse(localStorage.getItem('saheli_history') || '[]');
        box.innerHTML = history.length ? '<label style="display:block;text-align:center;margin-bottom:10px">Recent</label>' : '';
        history.reverse().forEach(i => {
            box.innerHTML += `<div class="h-item"><span><b>${i.n}</b></span> <span>₹${i.p}</span></div>`;
        });
    }

    function resetApp() {
        document.getElementById('p_name').value = '';
        document.getElementById('p_model').value = '';
        document.getElementById('p_color').value = '';
        document.getElementById('p_price').value = '';
        document.getElementById('form-box').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
    }

    loadHistory();
</script>
</body>
</html>
