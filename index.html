<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile QR Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f8fafc;
            --text: #1e293b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: white;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        h2 {
            margin-top: 0;
            font-size: 1.5rem;
            text-align: center;
            color: var(--primary);
        }

        .input-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: #64748b;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px; /* Prevents iOS zoom on focus */
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.4);
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.98);
        }

        #qr-hidden {
            display: none;
        }

        .footer {
            text-align: center;
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>QR PDF Creator</h2>
    
    <div class="input-group">
        <label>Product Name</label>
        <input type="text" id="name" placeholder="Enter name...">
    </div>

    <div class="input-group">
        <label>Model Number</label>
        <input type="text" id="model" placeholder="Enter model...">
    </div>

    <div class="input-group">
        <label>Price</label>
        <input type="number" id="price" placeholder="0.00" step="0.01">
    </div>

    <button onclick="createPDF()">Generate & Download PDF</button>

    <div class="footer">Generates a high-quality 4x4 inch PDF label</div>
</div>

<div id="qr-hidden"></div>

<script>
    function createPDF() {
        const { jsPDF } = window.jspdf;
        const name = document.getElementById('name').value;
        const model = document.getElementById('model').value;
        const price = document.getElementById('price').value;

        if (!name || !model || !price) {
            alert("Please fill out all fields!");
            return;
        }

        // Clean previous QR
        const qrBox = document.getElementById("qr-hidden");
        qrBox.innerHTML = "";

        // Combine data for QR
        const combinedData = `NAME: ${name}\nMODEL: ${model}\nPRICE: $${price}`;

        // Create QR Code
        new QRCode(qrBox, {
            text: combinedData,
            width: 256,
            height: 256,
            correctLevel: QRCode.CorrectLevel.H
        });

        // Small delay to ensure QR is rendered in DOM
        setTimeout(() => {
            const canvas = qrBox.querySelector('canvas');
            const qrImage = canvas.toDataURL("image/png");

            // Create PDF (100mm x 100mm Square Label)
            const doc = new jsPDF({
                unit: "mm",
                format: [100, 100]
            });

            // Design the PDF
            doc.setFont("helvetica", "bold");
            doc.setFontSize(16);
            doc.text("PRODUCT LABEL", 50, 15, { align: "center" });
            
            // Add QR Code
            doc.addImage(qrImage, 'PNG', 20, 20, 60, 60);

            // Add Details
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(`Name: ${name}`, 10, 85);
            doc.text(`Model: ${model}`, 10, 91);
            
            doc.setFont("helvetica", "bold");
            doc.text(`Price: $${price}`, 10, 97);

            // Save PDF
            doc.save(`Label_${name.replace(/\s+/g, '_')}.pdf`);
        }, 200);
    }
</script>

</body>
</html>
