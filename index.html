<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saheli Label Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root { 
            --brand: #db2777; 
            --bg: #fff1f2; 
            --card: #ffffff; 
            --success: #10b981;
        }

        /* Standard App Styles */
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .app-card { width: 100%; max-width: 400px; background: var(--card); padding: 24px; border-radius: 24px; box-shadow: 0 10px 25px rgba(219, 39, 119, 0.1); box-sizing: border-box; text-align: center; }
        .brand-header h1 { margin: 0; color: var(--brand); font-size: 1.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .input-group { margin-bottom: 12px; text-align: left; }
        label { display: block; font-size: 0.7rem; font-weight: 700; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; border: 2px solid #fce7f3; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; }
        
        button { width: 100%; padding: 16px; border-radius: 14px; border: none; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .btn-main { background: var(--brand); color: white; }
        .btn-print { background: #3b82f6; color: white; display: none; }
        .btn-refresh { background: var(--success); color: white; display: none; }

        #preview-area { margin-top: 20px; display: none; border-top: 2px dashed #fce7f3; padding-top: 20px; }
        #qrcode { display: inline-block; padding: 10px; background: white; border: 1px solid #fce7f3; border-radius: 10px; }

        .history { width: 100%; max-width: 400px; margin-top: 20px; }
        .history-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 0.8rem; display: flex; justify-content: space-between; border-left: 4px solid var(--brand); }

        /* PRINT-ONLY STYLES: This triggers when you hit Print */
        @media print {
            body { background: white; padding: 0; margin: 0; }
            .app-card, .history, .brand-header, button, .input-group, p { display: none !important; }
            #preview-area { display: block !important; border: none !important; padding: 0 !important; margin: 0 !important; }
            #qrcode canvas { width: 150px !important; height: 150px !important; }
            /* Hide the "Label Downloaded" text and "Refresh" button during print */
            .success-badge, #refresh-btn, #print-btn { display: none !important; }
        }
    </style>
</head>
<body>

<div class="app-card">
    <div class="brand-header">
        <h1>SAHELI</h1>
        <p style="margin:0; font-size:0.8rem; color:var(--brand);">Boutique Inventory Manager</p>
    </div>
    
    <div id="form-content">
        <div class="input-group"><label>Product Name</label><input type="text" id="name" placeholder="e.g. Designer Saree"></div>
        <div class="input-group"><label>Model Code</label><input type="text" id="model" placeholder="e.g. SH-2026"></div>
        <div class="input-group"><label>Color</label><input type="text" id="color" placeholder="e.g. Magenta"></div>
        <div class="input-group"><label>Price (₹)</label><input type="number" id="price" placeholder="0.00"></div>
        
        <button class="btn-main" onclick="generateLabel()">Generate PDF & Preview</button>
    </div>

    <div id="preview-area">
        <div id="qrcode"></div>
        <div id="label-text-preview" style="margin-bottom: 15px;"></div>
        <p class="success-badge" style="color: var(--success); font-weight: bold;">Label Ready!</p>
        
        <button class="btn-print" id="print-btn" onclick="window.print()">Print Directly</button>
        <button class="btn-refresh" id="refresh-btn" onclick="restart()">+ Create New Item</button>
    </div>
</div>

<div class="history" id="history-list"></div>

<script>
    let history = JSON.parse(localStorage.getItem('saheli_history') || '[]');

    function updateHistoryUI() {
        const container = document.getElementById('history-list');
        container.innerHTML = history.length ? '<label style="display:block; margin-bottom:10px; text-align:center;">Recent Labels</label>' : '';
        history.slice().reverse().forEach(item => {
            const div = document.createElement('div');
            div.className = 'history-item';
            div.innerHTML = `<span><b>${item.name}</b> (${item.color})</span> <span>₹${item.price}</span>`;
            container.appendChild(div);
        });
    }

    async function generateLabel() {
        const name = document.getElementById('name').value;
        const model = document.getElementById('model').value;
        const color = document.getElementById('color').value;
        const price = document.getElementById('price').value;

        if (!name || !model || !color || !price) {
            alert("Please fill all fields!");
            return;
        }

        const qrContainer = document.getElementById("qrcode");
        qrContainer.innerHTML = "";
        const qrData = `SAHELI\nItem: ${name}\nCode: ${model}\nColor: ${color}\nPrice: ₹${price}`;
        
        new QRCode(qrContainer, { text: qrData, width: 180, height: 180, correctLevel : QRCode.CorrectLevel.H });

        // Display on screen for print
        document.getElementById('label-text-preview').innerHTML = `
            <div style="color:#db2777; font-weight:bold; font-size:1.2rem;">SAHELI</div>
            <div style="font-size:1rem; font-weight:bold;">${name}</div>
            <div style="font-size:0.8rem;">Code: ${model} | Color: ${color}</div>
            <div style="font-size:1rem; font-weight:bold;">Price: Rs. ${price}</div>
        `;

        history.push({ name, model, color, price });
        if (history.length > 5) history.shift();
        localStorage.setItem('saheli_history', JSON.stringify(history));
        updateHistoryUI();

        // Also generate PDF for backup
        setTimeout(() => {
            const { jsPDF } = window.jspdf;
            const canvas = qrContainer.querySelector('canvas');
            const doc = new jsPDF({ unit: "mm", format: [80, 100] });
            
            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.setTextColor(219, 39, 119);
            doc.text("SAHELI", 40, 15, { align: "center" });
            doc.addImage(canvas.toDataURL("image/png"), 'PNG', 15, 20, 50, 50);
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(name.length > 20 ? 9 : 11);
            doc.text(`${name}`, 40, 78, { align: "center", maxWidth: 70 });
            doc.setFontSize(9);
            doc.setFont("helvetica", "normal");
            doc.text(`Code: ${model}`, 40, 85, { align: "center" });
            doc.text(`Color: ${color}`, 40, 90, { align: "center" });
            doc.setFont("helvetica", "bold");
            doc.text(`Price: Rs. ${price}`, 40, 97, { align: "center" });
            
            doc.save(`Saheli_${model}.pdf`);

            // UI FLOW
            document.getElementById("form-content").style.display = "none";
            document.getElementById("preview-area").style.display = "block";
            document.getElementById("print-btn").style.display = "block";
            document.getElementById("refresh-btn").style.display = "block";
        }, 400);
    }

    function restart() {
        ['name', 'model', 'color', 'price'].forEach(id => document.getElementById(id).value = '');
        document.getElementById("form-content").style.display = "block";
        document.getElementById("preview-area").style.display = "none";
        document.getElementById("qrcode").innerHTML = "";
    }

    updateHistoryUI();
</script>
</body>
</html>
