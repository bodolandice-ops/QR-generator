<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Saheli Label Creator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        :root { --brand: #db2777; --bg: #fff1f2; --card: #ffffff; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        .app-card { width: 100%; max-width: 400px; background: var(--card); padding: 24px; border-radius: 24px; box-shadow: 0 10px 25px rgba(219, 39, 119, 0.1); box-sizing: border-box; }
        .header { text-align: center; margin-bottom: 20px; }
        .header h1 { color: var(--brand); margin: 0; font-size: 1.8rem; letter-spacing: 1px; text-transform: uppercase; }
        
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; color: #64748b; margin-bottom: 4px; text-transform: uppercase; }
        input { width: 100%; padding: 14px; border: 2px solid #f1f5f9; border-radius: 12px; font-size: 16px; outline: none; box-sizing: border-box; transition: 0.2s; }
        input:focus { border-color: var(--brand); background: #fffbff; }

        button { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; margin-top: 10px; transition: 0.2s; }
        .btn-generate { background: var(--brand); color: white; box-shadow: 0 4px 10px rgba(219, 39, 119, 0.2); }
        .btn-refresh { background: #10b981; color: white; display: none; }
        
        #result-area { display: none; text-align: center; margin-top: 20px; padding-top: 20px; border-top: 2px dashed #fce7f3; }
        #qrcode-canvas { display: inline-block; padding: 10px; background: white; border: 1px solid #fce7f3; border-radius: 12px; }
        
        .history { width: 100%; max-width: 400px; margin-top: 20px; }
        .h-item { background: white; padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 0.85rem; display: flex; justify-content: space-between; border-left: 4px solid var(--brand); box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

<div class="app-card">
    <div class="header">
        <h1>SAHELI</h1>
        <p style="margin:0; font-size:0.8rem; color:#9d174d; opacity:0.8;">Boutique Label Manager</p>
    </div>

    <div id="form-box">
        <div class="input-group"><label>Product Name</label><input type="text" id="p_name" placeholder="e.g. Silk Saree"></div>
        <div class="input-group"><label>Model Code</label><input type="text" id="p_model" placeholder="e.g. SH-101"></div>
        <div class="input-group"><label>Color</label><input type="text" id="p_color" placeholder="e.g. Crimson Red"></div>
        <div class="input-group"><label>Price (₹)</label><input type="number" id="p_price" placeholder="0.00"></div>
        <button class="btn-generate" onclick="processLabel()">Generate & Download PDF</button>
    </div>

    <div id="result-area">
        <div id="qrcode-canvas"></div>
        <p style="font-weight: bold; color: #10b981; margin: 15px 0;">✓ Label Downloaded</p>
        <button class="btn-refresh" id="refresh-btn" onclick="resetApp()">+ Create New Label</button>
    </div>
</div>

<div class="history" id="history-box"></div>

<script>
    function processLabel() {
        const name = document.getElementById('p_name').value;
        const model = document.getElementById('p_model').value;
        const color = document.getElementById('p_color').value;
        const price = document.getElementById('p_price').value;

        if (!name || !model || !color || !price) {
            alert("Please fill all fields!");
            return;
        }

        const qrDiv = document.getElementById("qrcode-canvas");
        qrDiv.innerHTML = "";
        // QR Data remains detailed for scanning
        const qrData = `SAHELI\nItem: ${name}\nCode: ${model}\nColor: ${color}\nPrice: Rs.${price}`;
        
        new QRCode(qrDiv, {
            text: qrData,
            width: 160,
            height: 160
        });

        setTimeout(() => {
            const { jsPDF } = window.jspdf;
            const canvas = qrDiv.querySelector('canvas');
            const doc = new jsPDF({ unit: "mm", format: [80, 100] });

            // 1. BRAND HEADER
            doc.setFont("helvetica", "bold");
            doc.setFontSize(18);
            doc.setTextColor(219, 39, 119);
            doc.text("SAHELI", 40, 15, { align: "center" });
            
            // 2. QR CODE
            doc.addImage(canvas.toDataURL("image/png"), 'PNG', 15, 20, 50, 50);
            
            // 3. DETAILS BELOW QR (Name, Color, Price Only)
            doc.setTextColor(0, 0, 0);
            doc.setFontSize(12);
            doc.text(name, 40, 78, { align: "center", maxWidth: 70 });
            
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text(`Color: ${color}`, 40, 85, { align: "center" });
            
            doc.setFont("helvetica", "bold");
            doc.setFontSize(13);
            doc.text(`Price: Rs. ${price}`, 40, 93, { align: "center" });

            doc.save(`Saheli_${name.replace(/\s+/g, '_')}.pdf`);

            // UI FLOW
            document.getElementById('form-box').style.display = 'none';
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('refresh-btn').style.display = 'block';
            
            saveToHistory(name, price);
        }, 500);
    }

    function saveToHistory(n, p) {
        let history = JSON.parse(localStorage.getItem('saheli_history') || '[]');
        history.push({ n, p });
        if (history.length > 5) history.shift();
        localStorage.setItem('saheli_history', JSON.stringify(history));
        loadHistory();
    }

    function loadHistory() {
        const box = document.getElementById('history-box');
        let history = JSON.parse(localStorage.getItem('saheli_history') || '[]');
        box.innerHTML = history.length ? '<label style="display:block;text-align:center;margin:15px 0 10px 0; color:#64748b; font-size:0.7rem; font-weight:bold; text-transform:uppercase;">Recent Items</label>' : '';
        history.reverse().forEach(i => {
            box.innerHTML += `<div class="h-item"><span><b>${i.n}</b></span> <span>₹${i.p}</span></div>`;
        });
    }

    function resetApp() {
        // Clear inputs
        document.getElementById('p_name').value = '';
        document.getElementById('p_model').value = '';
        document.getElementById('p_color').value = '';
        document.getElementById('p_price').value = '';
        
        // Reset View
        document.getElementById('form-box').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
    }

    loadHistory();
</script>
</body>
</html>
